# Free single-service deploy for CellCount on Render (https://render.com).
# One web service runs the OpenCV backend AND serves the prebuilt React UI.
#
# The frontend build output (frontend/dist) is committed to the repo, so the
# server only needs Python — no Node required at build time. After changing any
# frontend code run `cd frontend && npm run build` and commit dist/.
#
# Deploy: Render dashboard -> New -> Blueprint -> pick this repo.

services:
  - type: web
    name: cellcount
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
